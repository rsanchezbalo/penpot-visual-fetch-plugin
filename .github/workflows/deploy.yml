name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: |
          REPO="/penpot-visual-fetch-plugin"
          mkdir dist
          cp icon.png dist/
          cp node_modules/@penpot/plugin-styles/styles.css dist/styles.css
          sed 's|/node_modules/@penpot/plugin-styles/styles.css|./styles.css|g' index.html > dist/index.html
          sed \
            -e 's|"host": "http://localhost:7654",||g' \
            -e "s|\"code\": \"plugin.js\"|\"code\": \"${REPO}/plugin.js\"|g" \
            -e "s|\"icon\": \"icon.png\"|\"icon\": \"${REPO}/icon.png\"|g" \
            manifest.json > dist/manifest.json
          sed "s|penpot.ui.open(\"Penpot Visual Fetch\", \"index.html\"|penpot.ui.open(\"Penpot Visual Fetch\", \"https://rsanchezbalo.github.io${REPO}/index.html\"|g" plugin.js > dist/plugin.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
